<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurabh's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(0, 7, 82);
            color:white;
            font-family: 'Poppins', sans-serif;

        }
        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            height:85px;
            background-color: rgb(14, 14, 115);
        }
        nav ul{
            display: flex;
            justify-content: center;
        }
        nav ul li{
            list-style: none;
            margin: 0 23px;
            
        }
        nav ul a{
            text-decoration: none;
            color: white;
        }
        nav ul a li:hover{
             color: rgb(169, 19, 255);

        }

        .left{
            font-size:1.5rem;
            color: white;
        }
        .first-section{
            display:flex;
            justify-content: space-around;
            margin:23px 0;
            align-items: center;
            margin:80px 0;
        }
        .first-section > div{
            width: 30%;
            margin: 30px 0;
        }
        .left-section{
            font-size:2rem

        }
        .right-section{
            margin-top: 30px;
            width: 80%;
         
            border-radius: 50%;
        }
        .right-section img{
            margin-top: 30px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            

        }
        .Name{
            color:rgb(101, 0, 196);
        }

        #element{
            color:rgb(87, 8, 160);
        }

        .secondsection{
            max-width: 80vw;
            margin: auto;
        }

        main hr{
            border:0;
            background-color: rgb(87, 8, 160);
            height: 1.2px;
            margin: 40px 84px;

        }
    </style>

</head>

<body>
    <header>
        <nav>
            <div class="left">Saurabh's Portfolio.</div>
            <div class="right"></div>
            <ul>
                <a href="/"><li>Home</li></a>
                <a href="/"><li>About</li></a>
                <a href="/"><li>Projects</li></a>
                <a href="/"><li>Contact</li></a>
                <a href="/"><li>Services</li></a>
                
            </ul>
        </nav>
    </header>

    <main>
        <section class="first-section">
            <div class="left-section">
                <h1>Hi , My Name is <span class="Name">Saurabh</span> </h1> 
                <div>And I am a Passionate</div>
                <span id="element"></span>    
            </div>
            <div class="right-section">
                <img src="saurabhpic.jpg"  alt="">
            </div>

        </section>
      
        <hr>

        <section class="secondsection">
            <h1>Past Experience</h1>
        </section>
    </main>




















<script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
<script>
    var typed = new Typed('#element', {
      strings: ['Web Developer', 'Web Designer', 'Full Stack Developer'],
      typeSpeed: 100,
    });
  </script>
</body>

</html>
